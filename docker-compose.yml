version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apppulse
      POSTGRES_PASSWORD: apppulse
      POSTGRES_DB: apppulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apppulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://apppulse:apppulse@postgres:5432/apppulse
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000"
      REFRESH_INTERVAL_SECONDS: "900"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Local dev only: hot-reload on code changes. Render (and any other
    # production deploy) uses the Dockerfile's CMD as-is, without --reload.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
