# Render Blueprint (Infrastructure as Code).
#
# Deploy: push this repo to GitHub/GitLab, then in the Render dashboard
# choose "New +" -> "Blueprint" and point it at this repo. Render reads
# this file and provisions everything below.
#
# After the first deploy, go to the apppulse-backend service's
# Environment tab and set CORS_ORIGINS to your actual Netlify URL, e.g.
#   CORS_ORIGINS=["https://your-site.netlify.app"]
# (It defaults to allowing nothing but localhost until you do this.)
#
# Note on cost: Render's free web-service tier spins down after ~15 minutes
# of inactivity, which pauses the background polling job along with it -
# fine for demoing, not for genuinely continuous "real-time" refresh. For
# that, use at least a Starter-tier web service. See DEPLOYMENT.md for the
# full breakdown, including the optional dedicated-worker setup below.

databases:
  - name: apppulse-db
    databaseName: apppulse
    user: apppulse
    plan: free               # Render's free Postgres expires ~30 days after creation - see DEPLOYMENT.md
    region: oregon

services:
  # --- Backend API (FastAPI) + embedded scheduler ---
  - type: web
    name: apppulse-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter             # free tier works but will spin down and pause polling - see DEPLOYMENT.md
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apppulse-db
          property: connectionString
      - key: REFRESH_INTERVAL_SECONDS
        value: "900"
      - key: ENABLE_EMBEDDED_SCHEDULER
        value: "true"          # set to "false" if you enable the separate worker service below
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'   # replace with your Netlify URL after first deploy
      - key: SECRET_KEY
        generateValue: true

  # --- Optional: dedicated background worker ---
  # Uncomment this block (and set ENABLE_EMBEDDED_SCHEDULER=false above) if
  # you want polling to run independently of web traffic, instead of inside
  # the web service. This is a second paid service - see DEPLOYMENT.md
  # before enabling it.
  #
  # - type: worker
  #   name: apppulse-worker
  #   runtime: docker
  #   dockerfilePath: ./backend/Dockerfile
  #   dockerContext: ./backend
  #   dockerCommand: python -m app.worker_main
  #   plan: starter
  #   region: oregon
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: apppulse-db
  #         property: connectionString
  #     - key: REFRESH_INTERVAL_SECONDS
  #       value: "900"
